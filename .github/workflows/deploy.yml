name: Deploy Backend
on:
  push:
  branches: [ "main" ]

jobs:
 deploy:
 runs-on: self-hosted
 steps:
 - name: Checkout Repo
   uses: actions/checkout@v3

 - name: Build JAR  
   run: mvn clean install  
 - name: Deploy to Server  
   run: |  
     cp target/app.jar /opt/backend-app/app.jar  
     sudo systemctl restart backend

